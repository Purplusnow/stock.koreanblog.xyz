<!doctype html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>K-Stock Dashboard</title>

<meta name="description" content="국내 주식 시장 정보 · 거래량 상위 · 상승률 상위 종목 확인">

<!-- AdSense -->
<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4640178123605595"
crossorigin="anonymous"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#0b0f17;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

h1,h2{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
}

th{
text-align:left;
color:#aaa;
}

.num{
text-align:right;
}

.up{
color:#22c55e;
}

.down{
color:#ef4444;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:10px;
}

.ad{
margin-top:20px;
margin-bottom:20px;
}

</style>
</head>


<body>

<div class="container">

<h1>K-Stock Dashboard</h1>

<div class="card">

<h2>오늘 시장</h2>

<div id="market"></div>

<div class="ad">

<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-4640178123605595"
data-ad-slot="1089514795"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</div>

</div>


<div class="grid">

<div class="card">

<h2>거래량 TOP10</h2>

<table id="volumeTable">

<thead>
<tr>
<th>종목</th>
<th class="num">가격</th>
<th class="num">등락률</th>
<th class="num">거래량</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div class="card">

<h2>상승률 TOP10</h2>

<table id="changeTable">

<thead>
<tr>
<th>종목</th>
<th class="num">가격</th>
<th class="num">등락률</th>
<th class="num">거래량</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<div class="card">

<h2>관심종목</h2>

<input id="symbolInput" placeholder="예: 005930.KS">
<button onclick="addStock()">추가</button>

<table id="allTable">

<thead>
<tr>
<th>종목</th>
<th class="num">가격</th>
<th class="num">등락</th>
<th class="num">등락률</th>
<th class="num">거래량</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="ad">

<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-4640178123605595"
data-ad-slot="1089514795"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</div>

</div>


<div class="card">

<h2>증권 뉴스</h2>

<ul>

<li><a href="https://finance.naver.com/news/" target="_blank">네이버 증권 뉴스</a></li>
<li><a href="https://finance.daum.net/news" target="_blank">다음 증권 뉴스</a></li>
<li><a href="https://www.krx.co.kr/main/main.jsp" target="_blank">한국거래소</a></li>

</ul>

</div>

</div>


<script>

let stocks=[

"005930.KS",
"000660.KS",
"005380.KS",
"035420.KS",
"035720.KS",
"373220.KS",
"068270.KS",
"051910.KS",
"006400.KS",
"207940.KS"

];

function addStock(){

let s=document.getElementById("symbolInput").value;

if(!s)return;

stocks.push(s);

loadStocks();

}

async function fetchQuotes(symbols){

let url="https://query1.finance.yahoo.com/v7/finance/quote?symbols="+symbols.join(",");

let res=await fetch(url);

let data=await res.json();

return data.quoteResponse.result;

}

async function loadStocks(){

let quotes=await fetchQuotes(stocks);

let rows=quotes.map(x=>({

symbol:x.symbol,

price:x.regularMarketPrice,

change:x.regularMarketChange,

pct:x.regularMarketChangePercent,

volume:x.regularMarketVolume

}));


let volume=[...rows].sort((a,b)=>b.volume-a.volume).slice(0,10);

let change=[...rows].sort((a,b)=>b.pct-a.pct).slice(0,10);

render("volumeTable",volume);

render("changeTable",change);

render("allTable",rows);

}


function render(id,data){

let tbody=document.querySelector("#"+id+" tbody");

tbody.innerHTML="";

data.forEach(r=>{

let tr=document.createElement("tr");

let cls=r.pct>=0?"up":"down";

tr.innerHTML=`

<td>${r.symbol}</td>

<td class="num">${r.price}</td>

<td class="num ${cls}">${r.pct.toFixed(2)}%</td>

<td class="num">${r.volume}</td>

`;

tbody.appendChild(tr);

});

}


loadStocks();

</script>


</body>
</html>
