<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>K-Stock Dashboard v1.2.3</title>

<style>

html,body{
width:100%;
overflow-x:hidden;
}

:root{
--bg1:#050a12;
--bg2:#071427;
--card:#0a1b33cc;
--card2:#091a31b3;
--stroke:#ffffff14;
--stroke2:#ffffff1f;
--text:#eaf2ff;
--muted:#b7c6e6cc;
--muted2:#b7c6e699;
--good:#2ecc71;
--bad:#ff4d4f;
--warn:#ffcc00;
--shadow:0 18px 50px rgba(0,0,0,.45);
--r:22px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",Arial;
color:var(--text);
background:
radial-gradient(1100px 500px at 15% 0%, #0e2a52 0%, transparent 60%),
radial-gradient(900px 480px at 85% 10%, #1a4a3e 0%, transparent 62%),
linear-gradient(180deg,var(--bg1),var(--bg2));
min-height:100vh;
}

.wrap{
max-width:1280px;
margin:0 auto;
padding:22px 18px 38px;
overflow-x:clip;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:14px;
margin-bottom:18px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:40px;
height:40px;
border-radius:12px;
background:linear-gradient(135deg,#4aa3ff,#42e6b8);
}

.title b{
font-size:26px;
}

.actions{
display:flex;
align-items:center;
gap:10px;
}

.pill{
display:flex;
align-items:center;
gap:8px;
padding:8px 12px;
border-radius:999px;
border:1px solid var(--stroke);
background:#0c1c33aa;
font-size:13px;
}

.dot{
width:9px;
height:9px;
border-radius:50%;
background:var(--warn);
}

.btn{
border:1px solid var(--stroke2);
background:#12305a;
color:white;
padding:8px 12px;
border-radius:12px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.card{
border-radius:var(--r);
background:var(--card);
border:1px solid var(--stroke);
overflow:hidden;
}

.hd{
padding:16px;
display:flex;
justify-content:space-between;
}

.bd{
padding:16px;
}

.indexRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:14px;
}

@media(max-width:520px){
.indexRow{grid-template-columns:1fr}
}

.ibox{
border-radius:18px;
border:1px solid var(--stroke);
background:#0b1b31;
padding:14px;
}

.price{
font-size:22px;
font-weight:800;
}

.chg{
font-size:13px;
font-weight:700;
}

.good{color:var(--good)}
.bad{color:var(--bad)}

.toolbar{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.search input{
height:42px;
padding:0 12px;
border-radius:12px;
border:1px solid var(--stroke2);
background:#0c111a;
color:white;
}

.tableWrap{
margin-top:12px;
border-radius:16px;
border:1px solid var(--stroke);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid var(--stroke);
font-size:13px;
}

th{
color:var(--muted2);
background:#ffffff05;
}

.right{text-align:right}

.mList{
display:none;
padding:10px;
}

.mRow{
border:1px solid var(--stroke);
border-radius:14px;
padding:12px;
margin-bottom:10px;
background:#00000020;
}

.mTop{
display:flex;
justify-content:space-between;
font-weight:800;
}

.mBot{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:8px;
}

.mMetric{
display:flex;
justify-content:space-between;
border:1px solid var(--stroke2);
border-radius:10px;
padding:6px 8px;
font-size:13px;
}

@media(max-width:720px){

table{display:none}

.mList{
display:block
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="brand">
<div class="logo"></div>
<div class="title">
<b>K-Stock Dashboard</b>
</div>
</div>

<div class="actions">

<div class="pill">
<span class="dot" id="statusDot"></span>
<span id="statusText">준비</span>
</div>

<button class="btn" id="btnRefresh">새로고침</button>

</div>

</div>


<div class="grid">

<section class="card">

<div class="hd">
<h2>오늘 시장</h2>
<div id="lastUpdated">-</div>
</div>

<div class="bd">

<div class="indexRow">

<div class="ibox">
<div>코스피</div>
<div class="price" id="kospiPrice">-</div>
<div class="chg" id="kospiChg">-</div>
</div>

<div class="ibox">
<div>코스닥</div>
<div class="price" id="kosdaqPrice">-</div>
<div class="chg" id="kosdaqChg">-</div>
</div>

</div>

</div>

</section>



<section class="card">

<div class="hd">
<h2>전종목</h2>
<div id="countPill">-</div>
</div>

<div class="bd">

<div class="toolbar">

<div class="search">
<input id="q" placeholder="종목 검색">
</div>

</div>

<div class="tableWrap">

<table>
<thead>
<tr>
<th>종목</th>
<th class="right">가격</th>
<th class="right">등락</th>
<th class="right">등락률</th>
<th class="right">거래량</th>
</tr>
</thead>

<tbody id="allTbody">
<tr>
<td colspan="5">데이터 로딩중</td>
</tr>
</tbody>

</table>

<div class="mList" id="mList"></div>

</div>

</div>

</section>

</div>

</div>


<script>

const $=id=>document.getElementById(id)

let ALL_LIST=[]
let VIEW_ROWS=[]
let QUOTE_MAP=new Map()

function setStatus(kind,msg){

const dot=$("statusDot")
const text=$("statusText")

text.textContent=msg

if(kind==="ok")dot.style.background="#2ecc71"
else if(kind==="error")dot.style.background="#ff4d4f"
else dot.style.background="#ffcc00"

}

function fmt(n){
if(!n)return "-"
return Number(n).toLocaleString("ko-KR")
}

function fmtPct(n){
if(!n)return "-"
return Number(n).toFixed(2)+"%"
}

function classBySign(n){
if(n>0)return"good"
if(n<0)return"bad"
return""
}

function renderAll(){

const tb=$("allTbody")

tb.innerHTML=VIEW_ROWS.map(x=>{

const it=QUOTE_MAP.get(x.symbol)

if(!it)return""

const p=it.regularMarketPrice
const c=it.regularMarketChange
const pct=it.regularMarketChangePercent
const v=it.regularMarketVolume

return`

<tr>
<td>${x.name}</td>
<td class="right">${fmt(p)}</td>
<td class="right ${classBySign(c)}">${fmt(c)}</td>
<td class="right ${classBySign(pct)}">${fmtPct(pct)}</td>
<td class="right">${fmt(v)}</td>
</tr>

`

}).join("")

}

function renderMobile(){

const box=$("mList")

box.innerHTML=VIEW_ROWS.slice(0,300).map(x=>{

const it=QUOTE_MAP.get(x.symbol)

if(!it)return""

return`

<div class="mRow">

<div class="mTop">
<div>${x.name}</div>
<div>${fmt(it.regularMarketPrice)}</div>
</div>

<div class="mBot">

<div class="mMetric">
<span>등락</span>
<span class="${classBySign(it.regularMarketChange)}">${fmt(it.regularMarketChange)}</span>
</div>

<div class="mMetric">
<span>등락률</span>
<span class="${classBySign(it.regularMarketChangePercent)}">${fmtPct(it.regularMarketChangePercent)}</span>
</div>

<div class="mMetric" style="grid-column:1/-1">
<span>거래량</span>
<span>${fmt(it.regularMarketVolume)}</span>
</div>

</div>

</div>

`

}).join("")

}

async function refresh(){

setStatus("warn","로딩")

try{

// 여기 기존 worker 호출 그대로 사용
// (기존 코드 그대로 붙이면 됨)

setStatus("ok","정상")

}catch(e){

setStatus("error","오류")

}

}

$("btnRefresh").onclick=refresh

refresh()

</script>

</body>
</html>
