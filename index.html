<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K-Stock Dashboard v1.2.1</title>
  <meta name="description" content="국내 주식(코스피/코스닥) 대시보드: 네이버 실시간 시세 기반 지수 + 전종목(가나다순)." />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4640178123605595"
          crossorigin="anonymous"></script>

  <style>
    :root{
      --bg1:#050a12; --bg2:#071427;
      --card:#0a1b33cc; --card2:#091a31b3;
      --stroke:#ffffff14; --stroke2:#ffffff1f;
      --text:#eaf2ff; --muted:#b7c6e6cc; --muted2:#b7c6e699;
      --good:#2ecc71; --bad:#ff4d4f; --warn:#ffcc00;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --r:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 500px at 15% 0%, #0e2a52 0%, transparent 60%),
        radial-gradient(900px 480px at 85% 10%, #1a4a3e 0%, transparent 62%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    a{color:inherit}
    .wrap{max-width:1280px; margin:0 auto; padding:22px 18px 38px}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px;}
    .brand{display:flex; align-items:center; gap:12px; min-width:240px}
    .logo{width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#4aa3ff,#42e6b8); box-shadow:0 10px 30px rgba(0,0,0,.35);}
    .title{display:flex; flex-direction:column; line-height:1.1}
    .title b{font-size:28px; letter-spacing:.2px}
    .title span{color:var(--muted2); font-size:13px; margin-top:4px}
    .actions{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end}
    .pill{display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:999px; border:1px solid var(--stroke);
      background:linear-gradient(180deg,#0c1c33aa,#071427aa); box-shadow:0 12px 30px rgba(0,0,0,.25); color:var(--muted); font-size:13px; user-select:none;}
    .dot{width:9px; height:9px; border-radius:50%; background:var(--warn); box-shadow:0 0 0 4px rgba(255,204,0,.12);}
    .btn{appearance:none; border:1px solid var(--stroke2); background:linear-gradient(180deg,#12305a,#0b1f3f);
      color:#eaf2ff; padding:10px 14px; border-radius:14px; cursor:pointer; font-weight:650; letter-spacing:.2px; box-shadow:0 14px 36px rgba(0,0,0,.3);}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{background:linear-gradient(180deg,#141b25,#0c111a); color:#eaf2ffcc;}

    .grid{display:grid; grid-template-columns: 1fr; gap:16px; align-items:start;}
    .card{border-radius:var(--r); background:linear-gradient(180deg, var(--card), var(--card2)); border:1px solid var(--stroke);
      box-shadow:var(--shadow); overflow:hidden; min-width:0;}
    .card .hd{padding:18px 18px 14px; display:flex; align-items:flex-end; justify-content:space-between; gap:10px;}
    .card .hd h2{margin:0; font-size:24px; letter-spacing:.2px}
    .card .hd .sub{color:var(--muted2); font-size:13px; text-align:right}
    .card .bd{padding:0 18px 18px}

    .indexRow{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;}
    @media (max-width: 520px){ .indexRow{grid-template-columns:1fr} }
    .ibox{border-radius:18px; border:1px solid var(--stroke); background:linear-gradient(180deg,#0b1b31,#071427); padding:14px 14px;}
    .ibox .name{color:var(--muted2); font-weight:650; font-size:13px; display:flex; justify-content:space-between; gap:8px;}
    .ibox .val{margin-top:10px; display:flex; align-items:flex-end; justify-content:space-between; gap:10px;}
    .ibox .price{font-size:22px; font-weight:800}
    .ibox .chg{font-size:13px; font-weight:750; padding:6px 10px; border-radius:999px; border:1px solid var(--stroke2); background:#0a1220; white-space:nowrap;}

    .good{color:var(--good)} .bad{color:var(--bad)} .muted{color:var(--muted2)}

    .adsBox{border-radius:18px; border:1px dashed var(--stroke2); padding:12px; background:rgba(0,0,0,.12); min-height:120px; margin-top:12px;}
    .adsBox .label{color:var(--muted2); font-size:12px; margin-bottom:8px;}

    .toolbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin:6px 0 12px;}
    .seg{display:flex; gap:8px; flex-wrap:wrap;}
    .seg button{appearance:none; border:1px solid var(--stroke2); background:rgba(0,0,0,.20); color:#eaf2ffcc; padding:9px 12px; border-radius:999px; cursor:pointer; font-weight:750;}
    .seg button.active{background:linear-gradient(180deg,#12305a,#0b1f3f); color:#eaf2ff; border-color:#ffffff2a;}

    .search{display:flex; align-items:center; gap:10px; flex:1; min-width:220px; justify-content:flex-end;}
    .search input{width:min(520px, 100%); height:44px; padding:0 14px; border-radius:14px; border:1px solid var(--stroke2);
      background:rgba(0,0,0,.20); color:var(--text); outline:none; font-size:14px;}

    .miniLine{color:var(--muted2); font-size:13px; margin:6px 0 0;}

    table{width:100%; border-collapse:collapse; overflow:hidden;}
    th, td{padding:11px 10px; border-bottom:1px solid var(--stroke); font-size:13px; vertical-align:middle;}
    th{text-align:left; color:var(--muted2); font-weight:750; background:rgba(255,255,255,.03); white-space:nowrap; position:sticky; top:0; backdrop-filter: blur(10px); z-index:2;}
    td{color:#eaf2ffdd}
    .right{text-align:right; white-space:nowrap}

    .nameCell{display:flex; align-items:center; gap:10px; min-width:0;}
    .nameCell .nm{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:750;}
    .nameCell .sy{flex:0 0 auto; color:var(--muted2); font-size:12px; font-weight:700; white-space:nowrap;}
    .pillMini{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--stroke2);
      background:rgba(0,0,0,.18); color:#eaf2ffcc; font-size:12px; font-weight:750; white-space:nowrap;}

    .foot{margin-top:16px; color:var(--muted2); font-size:12px; text-align:right;}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b>K-Stock Dashboard</b>
          <span>v1.2.1 · 네이버 시세 기반 · 전종목 가나다순</span>
        </div>
      </div>

      <div class="actions">
        <div class="pill" id="statusPill">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">상태: 준비</span>
        </div>
        <button class="btn" id="btnRefresh">새로고침</button>
        <button class="btn secondary" id="btnNaver">네이버증권</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <div class="hd">
          <h2>오늘 시장</h2>
          <div class="sub">
            <div>업데이트: <span id="lastUpdated">-</span></div>
          </div>
        </div>

        <div class="bd">
          <div class="indexRow">
            <div class="ibox">
              <div class="name">
                <span>코스피</span>
                <span class="muted">^KS11</span>
              </div>
              <div class="val">
                <div class="price" id="kospiPrice">-</div>
                <div class="chg" id="kospiChg">-</div>
              </div>
            </div>

            <div class="ibox">
              <div class="name">
                <span>코스닥</span>
                <span class="muted">^KQ11</span>
              </div>
              <div class="val">
                <div class="price" id="kosdaqPrice">-</div>
                <div class="chg" id="kosdaqChg">-</div>
              </div>
            </div>
          </div>

          <div class="adsBox">
            <div class="label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-4640178123605595"
                 data-ad-slot="1089514795"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd">
          <h2>전종목</h2>
          <div class="sub">
            <div class="pillMini" id="countPill">-</div>
          </div>
        </div>

        <div class="bd">
          <div class="toolbar">
            <div class="seg">
              <button id="btnAll" class="active" data-market="ALL">전체</button>
              <button id="btnKospi" data-market="KOSPI">코스피</button>
              <button id="btnKosdaq" data-market="KOSDAQ">코스닥</button>
            </div>

            <div class="search">
              <input id="q" placeholder="검색: 종목명 또는 코드(예: 삼성전자 / 005930)" />
            </div>
          </div>

          <div class="miniLine" id="hintLine">전종목을 불러오는 중…</div>

          <div style="margin-top:12px; max-height:68vh; overflow:auto; border-radius:16px; border:1px solid var(--stroke);">
            <table>
              <thead>
                <tr>
                  <th>종목</th>
                  <th class="right">가격</th>
                  <th class="right">등락</th>
                  <th class="right">등락률</th>
                  <th class="right">거래량</th>
                </tr>
              </thead>
              <tbody id="allTbody">
                <tr><td colspan="5" class="muted">데이터를 불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>

    <div class="foot">
      데이터: Naver Finance (via Cloudflare Worker) · 표시값은 지연/오차가 있을 수 있습니다.
    </div>
  </div>

  <script>
    // 1) 워커는 "시세(/quote)"만 담당
    const WORKER_BASE = "https://billowing-snowflake-fc22.purplusnow.workers.dev";

    // 2) 전종목 리스트는 정적 JSON 파일로
    //    너가 GitHub Pages에 이 파일을 추가하면 됨: /data/kospi_kosdaq_list.json
    const LIST_URL = "./data/kospi_kosdaq_list.json";

    const INDEX_SYMBOLS = ["^KS11","^KQ11"];

    const $ = (id) => document.getElementById(id);

    let MARKET_FILTER = "ALL";
    let ALL_LIST = [];
    let QUOTE_MAP = new Map();
    let VIEW_ROWS = [];

    function setStatus(kind, msg){
      const dot = $("statusDot");
      const text = $("statusText");
      text.textContent = msg;

      if (kind === "ok") {
        dot.style.background = getComputedStyle(document.documentElement).getPropertyValue("--good");
        dot.style.boxShadow = "0 0 0 4px rgba(46,204,113,.12)";
      } else if (kind === "error") {
        dot.style.background = getComputedStyle(document.documentElement).getPropertyValue("--bad");
        dot.style.boxShadow = "0 0 0 4px rgba(255,77,79,.12)";
      } else {
        dot.style.background = getComputedStyle(document.documentElement).getPropertyValue("--warn");
        dot.style.boxShadow = "0 0 0 4px rgba(255,204,0,.12)";
      }
    }

    function fmtNum(n){
      if (n === null || n === undefined || Number.isNaN(n)) return "-";
      return n.toLocaleString("ko-KR");
    }
    function fmtPrice(n){
      if (n === null || n === undefined || Number.isNaN(n)) return "-";
      const hasDec = Math.abs(n) < 10000 && (String(n).includes(".") || n % 1 !== 0);
      return hasDec ? n.toLocaleString("ko-KR", { maximumFractionDigits: 2 }) : n.toLocaleString("ko-KR");
    }
    function fmtPct(n){
      if (n === null || n === undefined || Number.isNaN(n)) return "-";
      return n.toLocaleString("ko-KR", { maximumFractionDigits: 2 }) + "%";
    }
    function classBySign(n){
      if (n === null || n === undefined || Number.isNaN(n)) return "";
      if (n > 0) return "good";
      if (n < 0) return "bad";
      return "";
    }
    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function nameCellHtml(name, symbol){
      return `
        <div class="nameCell">
          <span class="nm">${escapeHtml(name || "-")}</span>
          <span class="sy">${escapeHtml(symbol)}</span>
        </div>
      `;
    }

    async function fetchStaticList(){
      const r = await fetch(LIST_URL, { cache: "no-store" });
      const t = await r.text();
      if (!r.ok) throw new Error("LIST HTTP " + r.status + " " + t.slice(0, 160));
      let j;
      try { j = JSON.parse(t); } catch { throw new Error("LIST JSON parse failed: " + t.slice(0, 160)); }
      const items = j?.items;
      if (!Array.isArray(items)) throw new Error("LIST schema unexpected: " + t.slice(0, 160));
      return items;
    }

    async function fetchQuoteChunk(symbols){
      const q = encodeURIComponent(symbols.join(","));
      const url = WORKER_BASE + "/quote?symbols=" + q;

      const r = await fetch(url, { cache: "no-store" });
      const text = await r.text();
      if (!r.ok) throw new Error("Worker /quote HTTP " + r.status + " " + text.slice(0, 160));

      let json;
      try { json = JSON.parse(text); }
      catch { throw new Error("Quote JSON parse failed: " + text.slice(0, 160)); }

      const result = json?.quoteResponse?.result;
      if (!Array.isArray(result)) throw new Error("Quote schema unexpected: " + text.slice(0, 160));

      for (const it of result) {
        if (it?.symbol) QUOTE_MAP.set(it.symbol, it);
      }
    }

    async function fetchAllQuotes(allSymbols){
      const CHUNK = 120;
      const CONCURRENCY = 3;

      const chunks = [];
      for (let i = 0; i < allSymbols.length; i += CHUNK) chunks.push(allSymbols.slice(i, i + CHUNK));

      let idx = 0;
      async function loop(){
        while (idx < chunks.length) {
          const my = idx++;
          await fetchQuoteChunk(chunks[my]);
        }
      }
      await Promise.all(Array.from({length: CONCURRENCY}, loop));
    }

    function renderIndex(item, priceEl, chgEl){
      if (!item) {
        priceEl.textContent = "-";
        chgEl.textContent = "-";
        chgEl.className = "chg";
        return;
      }
      const price = item.regularMarketPrice;
      const chg = item.regularMarketChange;
      const pct = item.regularMarketChangePercent;

      priceEl.textContent = fmtPrice(price);

      const cls = classBySign(chg);
      chgEl.className = "chg " + cls;
      const sign = (chg > 0) ? "+" : "";
      chgEl.textContent = sign + fmtPrice(chg) + " (" + sign + fmtPct(pct) + ")";
    }

    function applyFilterAndSearch(){
      const q = ($("q").value || "").trim().toLowerCase();

      let base = ALL_LIST;
      if (MARKET_FILTER !== "ALL") base = base.filter(x => x.market === MARKET_FILTER);

      if (q) {
        base = base.filter(x => {
          const name = (x.name || "").toLowerCase();
          const code = (x.code || "").toLowerCase();
          return name.includes(q) || code.includes(q);
        });
      }

      base = base.slice().sort((a,b) => {
        const an = a.name || "";
        const bn = b.name || "";
        const c = an.localeCompare(bn, "ko");
        if (c !== 0) return c;
        return (a.code || "").localeCompare((b.code || ""), "en");
      });

      VIEW_ROWS = base;
      $("countPill").textContent = "표시 " + VIEW_ROWS.length.toLocaleString("ko-KR") + "개";
      $("hintLine").textContent = q ? "검색/필터 적용됨" : "가나다순으로 정렬됨";
      renderAllTable();
    }

    function renderAllTable(){
      const tb = $("allTbody");
      if (!VIEW_ROWS.length) {
        tb.innerHTML = `<tr><td colspan="5" class="muted">표시할 종목이 없습니다.</td></tr>`;
        return;
      }

      const LIMIT = 900;
      const rows = VIEW_ROWS.slice(0, LIMIT);

      tb.innerHTML = rows.map(x => {
        const symbol = x.code + (x.market === "KOSDAQ" ? ".KQ" : ".KS");
        const it = QUOTE_MAP.get(symbol);

        const price = it?.regularMarketPrice ?? null;
        const chg = it?.regularMarketChange ?? null;
        const pct = it?.regularMarketChangePercent ?? null;
        const vol = it?.regularMarketVolume ?? null;

        const clsChg = classBySign(chg);
        const clsPct = classBySign(pct);
        const signChg = (typeof chg === "number" && chg > 0) ? "+" : "";
        const signPct = (typeof pct === "number" && pct > 0) ? "+" : "";

        return `
          <tr>
            <td>${nameCellHtml(x.name, symbol)}</td>
            <td class="right">${fmtPrice(price)}</td>
            <td class="right ${clsChg}">${signChg}${fmtPrice(chg)}</td>
            <td class="right ${clsPct}">${signPct}${fmtPct(pct)}</td>
            <td class="right">${fmtNum(vol)}</td>
          </tr>
        `;
      }).join("") + (VIEW_ROWS.length > LIMIT ? `
        <tr><td colspan="5" class="muted">너무 많아서 상단 ${LIMIT.toLocaleString("ko-KR")}개만 표시 중입니다. 검색으로 좁혀보세요.</td></tr>
      ` : "");
    }

    function setMarketBtn(activeId){
      ["btnAll","btnKospi","btnKosdaq"].forEach(id => $(id).classList.remove("active"));
      $(activeId).classList.add("active");
    }

    async function refreshAll(){
      setStatus("warn", "상태: 로딩");
      $("lastUpdated").textContent = "-";
      $("hintLine").textContent = "전종목을 불러오는 중…";
      $("countPill").textContent = "-";
      $("allTbody").innerHTML = `<tr><td colspan="5" class="muted">데이터를 불러오는 중…</td></tr>`;
      QUOTE_MAP = new Map();

      try {
        // ✅ 전종목 리스트는 정적 JSON에서만 읽음 (서브리퀘스트 폭탄 제거)
        ALL_LIST = await fetchStaticList();
        $("countPill").textContent = "총 " + ALL_LIST.length.toLocaleString("ko-KR") + "개";

        const symbols = [];
        symbols.push(...INDEX_SYMBOLS);
        for (const x of ALL_LIST) {
          const sym = x.code + (x.market === "KOSDAQ" ? ".KQ" : ".KS");
          symbols.push(sym);
        }

        await fetchAllQuotes(symbols);

        renderIndex(QUOTE_MAP.get("^KS11"), $("kospiPrice"), $("kospiChg"));
        renderIndex(QUOTE_MAP.get("^KQ11"), $("kosdaqPrice"), $("kosdaqChg"));

        applyFilterAndSearch();

        $("lastUpdated").textContent = new Date().toLocaleString("ko-KR");
        setStatus("ok", "상태: 정상");
      } catch (e) {
        console.error(e);
        setStatus("error", "상태: 오류");
        $("hintLine").textContent = "불러오기에 실패했습니다.";
        $("allTbody").innerHTML = `<tr><td colspan="5" class="muted">데이터를 불러오지 못했습니다.</td></tr>`;
      }
    }

    $("btnRefresh").addEventListener("click", refreshAll);
    $("btnNaver").addEventListener("click", () => window.open("https://finance.naver.com/", "_blank", "noopener,noreferrer"));

    $("btnAll").addEventListener("click", () => { MARKET_FILTER = "ALL"; setMarketBtn("btnAll"); applyFilterAndSearch(); });
    $("btnKospi").addEventListener("click", () => { MARKET_FILTER = "KOSPI"; setMarketBtn("btnKospi"); applyFilterAndSearch(); });
    $("btnKosdaq").addEventListener("click", () => { MARKET_FILTER = "KOSDAQ"; setMarketBtn("btnKosdaq"); applyFilterAndSearch(); });

    let qTimer = null;
    $("q").addEventListener("input", () => {
      clearTimeout(qTimer);
      qTimer = setTimeout(applyFilterAndSearch, 120);
    });

    try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch {}

    refreshAll();
  </script>
</body>
</html>
