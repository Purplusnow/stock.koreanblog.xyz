<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K-Stock Dashboard v1.0.3 - 국내주식 MVP</title>
  <meta name="description" content="국내 주요 종목과 관심종목의 가격/등락/거래량을 빠르게 확인합니다." />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4640178123605595"
    crossorigin="anonymous"></script>

  <style>
    :root{
      --bg:#070b12;
      --panel:#0b1220cc;
      --stroke:#1e2a3c;
      --text:#e8eefc;
      --muted:#9fb2d0;
      --accent:#3b82f6;
      --danger:#ef4444;
      --ok:#22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --radius: 22px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(1200px 600px at 15% 0%, rgba(59,130,246,.25), transparent 60%),
                  radial-gradient(900px 500px at 85% 10%, rgba(34,197,94,.16), transparent 60%),
                  radial-gradient(900px 500px at 30% 90%, rgba(239,68,68,.12), transparent 60%),
                  var(--bg);
      color: var(--text);
    }
    .wrap{
      max-width: 1320px;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }
    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 240px;
    }
    .logo{
      width:42px;height:42px;border-radius:14px;
      background: linear-gradient(135deg, rgba(59,130,246,.95), rgba(34,197,94,.75));
      box-shadow: 0 10px 30px rgba(59,130,246,.25);
    }
    .brand h1{
      margin:0;
      font-size: 28px;
      letter-spacing: .2px;
    }
    .brand .sub{
      margin-top:2px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      padding:10px 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 999px;
      font-size: 13px;
      display:flex;
      align-items:center;
      gap:8px;
      box-shadow: 0 12px 35px rgba(0,0,0,.25);
      user-select:none;
    }
    .btn{
      cursor:pointer;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      box-shadow: 0 12px 35px rgba(0,0,0,.25);
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
    }
    .btn:hover{ background: rgba(255,255,255,.06); border-color: rgba(59,130,246,.35); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      background: linear-gradient(180deg, rgba(59,130,246,.95), rgba(59,130,246,.75));
      border-color: rgba(59,130,246,.65);
    }
    .grid{
      display:grid;
      grid-template-columns: 1.2fr .9fr;
      gap:16px;
      align-items:start;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .card::before{
      content:"";
      position:absolute; inset:-2px;
      background: radial-gradient(500px 200px at 10% 0%, rgba(59,130,246,.14), transparent 60%),
                  radial-gradient(500px 200px at 90% 10%, rgba(34,197,94,.10), transparent 60%);
      pointer-events:none;
    }
    .card > *{ position:relative; }
    .card-h{
      padding:16px 18px 10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
    }
    .card-h h2{
      margin:0;
      font-size: 22px;
      letter-spacing:.2px;
    }
    .meta{
      color: var(--muted);
      font-size: 13px;
      text-align:right;
      line-height:1.35;
      white-space:nowrap;
    }
    .card-b{
      padding: 12px 18px 18px;
    }
    .market-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-bottom: 14px;
    }
    .mini{
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 18px;
      padding: 14px 14px;
      min-height: 92px;
    }
    .mini .t{
      display:flex;
      justify-content:space-between;
      align-items:center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .mini .p{
      font-size: 22px;
      font-weight: 700;
      letter-spacing:.2px;
    }
    .mini .c{
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .note{
      color: var(--muted);
      font-size: 13px;
      line-height:1.5;
      padding: 10px 0 2px;
    }
    .adbox{
      margin-top: 14px;
      border: 1px dashed rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 10px;
      background: rgba(0,0,0,.18);
      min-height: 290px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .input-row{
      display:flex;
      gap:10px;
      align-items:center;
    }
    input[type="text"]{
      flex:1;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.25);
      color: var(--text);
      padding: 0 14px;
      outline:none;
      font-size: 14px;
    }
    input[type="text"]::placeholder{ color: rgba(159,178,208,.65); }
    .chip-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top: 12px;
    }
    .chip{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-size: 14px;
    }
    .chip .sym{ color: var(--muted); font-weight:600; }
    .chip button{
      cursor:pointer;
      border:none;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-size: 16px;
      line-height: 26px;
    }
    .tables{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      margin-top: 16px;
    }
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 10px;
    }
    th{
      text-align:left;
      color: var(--muted);
      font-size: 13px;
      font-weight:600;
      padding: 0 10px 6px;
    }
    td{
      padding: 12px 10px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.06);
      border-left:none;
      border-right:none;
      font-size: 14px;
    }
    tr td:first-child{
      border-left: 1px solid rgba(255,255,255,.06);
      border-top-left-radius: 14px;
      border-bottom-left-radius: 14px;
      font-weight:700;
    }
    tr td:last-child{
      border-right: 1px solid rgba(255,255,255,.06);
      border-top-right-radius: 14px;
      border-bottom-right-radius: 14px;
      text-align:right;
    }
    .num{ text-align:right; font-variant-numeric: tabular-nums; }
    .pos{ color: var(--ok); }
    .neg{ color: var(--danger); }
    .muted{ color: var(--muted); }
    .footer{
      margin-top: 18px;
      color: rgba(159,178,208,.65);
      font-size: 12px;
      text-align:center;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .tables{ grid-template-columns: 1fr; }
      header{ align-items:flex-start; }
      .meta{ text-align:left; white-space:normal; }
      .top-actions{ justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>K-Stock Dashboard</h1>
          <div class="sub">v1.0.3 · 국내주식 MVP</div>
        </div>
      </div>

      <div class="top-actions">
        <div class="pill" id="statusPill">상태: 준비중</div>
        <button class="btn primary" id="refreshBtn">새로고침</button>
        <button class="btn" id="naverBtn">네이버증권</button>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="card-h">
          <h2>오늘 시장</h2>
          <div class="meta" id="updatedAt">업데이트: -</div>
        </div>
        <div class="card-b">
          <div class="market-row">
            <div class="mini">
              <div class="t">
                <span>코스피</span>
                <span class="muted">^KS11</span>
              </div>
              <div class="p" id="kospiPrice">-</div>
              <div class="c" id="kospiChg">-</div>
            </div>
            <div class="mini">
              <div class="t">
                <span>코스닥</span>
                <span class="muted">^KQ11</span>
              </div>
              <div class="p" id="kosdaqPrice">-</div>
              <div class="c" id="kosdaqChg">-</div>
            </div>
          </div>

          <div class="note">
            안내: 거래량 TOP10과 상승률 TOP10은 현재 목록(기본 30개 + 내가 추가한 종목) 범위에서 계산됩니다.
          </div>

          <div class="adbox">
            <ins class="adsbygoogle"
              style="display:block"
              data-ad-client="ca-pub-4640178123605595"
              data-ad-slot="1089514795"
              data-ad-format="auto"
              data-full-width-responsive="true"></ins>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-h">
          <h2>관심종목 관리</h2>
          <div class="meta">
            <div>기본 30개 + 내가 추가한 종목(로컬 저장)</div>
          </div>
        </div>
        <div class="card-b">
          <div class="input-row">
            <input id="symbolInput" type="text" placeholder="심볼 입력 예: 005930.KS / 035420.KS / 247540.KQ" />
            <button class="btn primary" id="addBtn" style="height:44px; padding:0 16px;">추가</button>
          </div>

          <div class="note">
            심볼은 005930.KS / 247540.KQ 형식으로 입력해줘.
          </div>

          <div class="chip-wrap" id="chipWrap"></div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top:16px;">
      <div class="card-h">
        <h2>랭킹</h2>
        <div class="meta">기준: 현재 목록(기본+추가)</div>
      </div>
      <div class="card-b">
        <div class="tables">
          <div>
            <div class="note" style="margin-bottom:6px;">거래량 TOP10</div>
            <table>
              <thead>
                <tr>
                  <th>종목</th>
                  <th class="num">가격</th>
                  <th class="num">등락률</th>
                  <th class="num">거래량</th>
                </tr>
              </thead>
              <tbody id="volTop10"></tbody>
            </table>
          </div>
          <div>
            <div class="note" style="margin-bottom:6px;">상승률 TOP10</div>
            <table>
              <thead>
                <tr>
                  <th>종목</th>
                  <th class="num">가격</th>
                  <th class="num">등락률</th>
                  <th class="num">거래량</th>
                </tr>
              </thead>
              <tbody id="chgTop10"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <div class="footer" id="footerTime"></div>
  </div>

  <script>
    var WORKER_BASE = "https://billowing-snowflake-fc22.purplusnow.workers.dev";

    var DEFAULT_30 = [
      ["삼성전자","005930.KS"],
      ["SK하이닉스","000660.KS"],
      ["현대차","005380.KS"],
      ["기아","000270.KS"],
      ["NAVER","035420.KS"],
      ["카카오","035720.KS"],
      ["LG에너지솔루션","373220.KS"],
      ["삼성바이오로직스","207940.KS"],
      ["셀트리온","068270.KS"],
      ["POSCO홀딩스","005490.KS"],
      ["삼성SDI","006400.KS"],
      ["LG화학","051910.KS"],
      ["삼성전자우","005935.KS"],
      ["KB금융","105560.KS"],
      ["신한지주","055550.KS"],
      ["하나금융지주","086790.KS"],
      ["삼성물산","028260.KS"],
      ["한화에어로스페이스","012450.KS"],
      ["한국전력","015760.KS"],
      ["KT","030200.KS"],
      ["LG전자","066570.KS"],
      ["대한항공","003490.KS"],
      ["카카오뱅크","323410.KS"],
      ["크래프톤","259960.KS"],
      ["삼성화재","000810.KS"],
      ["HD현대","267250.KS"],
      ["SK이노베이션","096770.KS"],
      ["두산에너빌리티","034020.KS"],
      ["에코프로비엠","247540.KQ"],
      ["에코프로","086520.KQ"]
    ];

    function el(id){ return document.getElementById(id); }

    var statusPill = el("statusPill");
    var updatedAt = el("updatedAt");

    var kospiPrice = el("kospiPrice");
    var kospiChg = el("kospiChg");
    var kosdaqPrice = el("kosdaqPrice");
    var kosdaqChg = el("kosdaqChg");

    var chipWrap = el("chipWrap");
    var symbolInput = el("symbolInput");

    var volTop10 = el("volTop10");
    var chgTop10 = el("chgTop10");

    var footerTime = el("footerTime");
    var LS_KEY = "kstock_watchlist_custom_v1";

    function fmtNum(n, digits){
      if (digits === undefined) digits = 2;
      if(n === null || n === undefined || Number.isNaN(n)) return "-";
      return Number(n).toLocaleString("ko-KR", { maximumFractionDigits: digits });
    }
    function fmtPct(n){
      if(n === null || n === undefined || Number.isNaN(n)) return "-";
      var v = Number(n);
      var s = (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
      return s;
    }
    function clsBySign(n){
      if(n === null || n === undefined || Number.isNaN(n)) return "";
      return Number(n) >= 0 ? "pos" : "neg";
    }
    function setStatus(ok, msg){
      statusPill.textContent = "상태: " + msg;
      statusPill.style.borderColor = ok ? "rgba(34,197,94,.45)" : "rgba(239,68,68,.45)";
      statusPill.style.color = ok ? "rgba(34,197,94,.95)" : "rgba(239,68,68,.95)";
      statusPill.style.background = ok ? "rgba(34,197,94,.08)" : "rgba(239,68,68,.08)";
    }

    function loadCustom(){
      try{
        var raw = localStorage.getItem(LS_KEY);
        if(!raw) return [];
        var arr = JSON.parse(raw);
        if(!Array.isArray(arr)) return [];
        return arr.filter(function(x){ return Array.isArray(x) && x.length === 2; });
      }catch(e){
        return [];
      }
    }
    function saveCustom(arr){
      localStorage.setItem(LS_KEY, JSON.stringify(arr));
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, function(m){
        return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" })[m];
      });
    }

    function mergeList(){
      var customs = loadCustom();
      var merged = DEFAULT_30.concat(customs);
      var seen = {};
      var out = [];
      for(var i=0;i<merged.length;i++){
        var name = merged[i][0];
        var sym = String(merged[i][1] || "").toUpperCase();
        if(!sym) continue;
        if(seen[sym]) continue;
        seen[sym] = true;
        out.push([name, sym]);
      }
      return out;
    }

    function renderChips(list){
      chipWrap.innerHTML = "";
      for(var i=0;i<list.length;i++){
        (function(idx){
          var name = list[idx][0];
          var sym = list[idx][1];

          var d = document.createElement("div");
          d.className = "chip";

          var spanName = document.createElement("span");
          spanName.textContent = name;

          var spanSym = document.createElement("span");
          spanSym.className = "sym";
          spanSym.textContent = sym;

          var btn = document.createElement("button");
          btn.title = "삭제";
          btn.setAttribute("aria-label","삭제");
          btn.textContent = "×";

          btn.addEventListener("click", function(){
            if(idx < DEFAULT_30.length) return;
            var customs = loadCustom();
            var customIndex = idx - DEFAULT_30.length;
            customs.splice(customIndex, 1);
            saveCustom(customs);
            refreshAll();
          });

          d.appendChild(spanName);
          d.appendChild(spanSym);
          d.appendChild(btn);
          chipWrap.appendChild(d);
        })(i);
      }
    }

    async function fetchQuotes(symbols){
      var q = encodeURIComponent(symbols.join(","));
      var url = WORKER_BASE + "/quote?symbols=" + q;
      var r = await fetch(url, { cache: "no-store" });
      var j = await r.json();
      if(!r.ok){
        throw new Error("HTTP " + r.status + " " + JSON.stringify(j));
      }
      var result = (j && j.quoteResponse && j.quoteResponse.result) ? j.quoteResponse.result : [];
      var err = (j && j.quoteResponse) ? j.quoteResponse.error : null;
      return { result: result, err: err };
    }

    function pickIndex(result, sym){
      for(var i=0;i<result.length;i++){
        if(result[i] && result[i].symbol === sym) return result[i];
      }
      return null;
    }

    function updateIndexUI(item, priceEl, chgEl){
      if(!item){
        priceEl.textContent = "-";
        chgEl.textContent = "-";
        return;
      }
      priceEl.textContent = fmtNum(item.regularMarketPrice, 2);

      var pct = item.regularMarketChangePercent;
      var chg = item.regularMarketChange;
      var line = fmtNum(chg, 2) + " (" + fmtPct(pct) + ")";
      chgEl.textContent = line;
      chgEl.className = "c " + clsBySign(pct);
    }

    function buildRankingRows(items){
      var rows = [];
      for(var i=0;i<items.length;i++){
        var x = items[i] || {};
        var name = x.shortName || x.symbol;
        rows.push({
          name: name,
          price: x.regularMarketPrice,
          pct: x.regularMarketChangePercent,
          vol: x.regularMarketVolume
        });
      }

      var byVol = rows
        .filter(function(r){ return r.vol !== null && r.vol !== undefined; })
        .sort(function(a,b){ return (b.vol||0) - (a.vol||0); })
        .slice(0,10);

      var byChg = rows
        .filter(function(r){ return r.pct !== null && r.pct !== undefined; })
        .sort(function(a,b){ return (b.pct||0) - (a.pct||0); })
        .slice(0,10);

      return { byVol: byVol, byChg: byChg };
    }

    function renderTable(tbody, list){
      tbody.innerHTML = "";
      if(!list.length){
        var tr0 = document.createElement("tr");
        tr0.innerHTML = '<td colspan="4" class="muted">데이터 없음</td>';
        tbody.appendChild(tr0);
        return;
      }

      for(var i=0;i<list.length;i++){
        var r = list[i];
        var tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + escapeHtml(r.name) + "</td>" +
          "<td class=\"num\">" + fmtNum(r.price, 2) + "</td>" +
          "<td class=\"num " + clsBySign(r.pct) + "\">" + fmtPct(r.pct) + "</td>" +
          "<td class=\"num\">" + (r.vol == null ? "-" : Number(r.vol).toLocaleString("ko-KR")) + "</td>";
        tbody.appendChild(tr);
      }
    }

    async function refreshAll(){
      try{
        setStatus(true, "불러오는 중");

        var list = mergeList();
        renderChips(list);

        var symbols = ["^KS11","^KQ11"];
        for(var i=0;i<list.length;i++){
          symbols.push(list[i][1]);
        }

        var resp = await fetchQuotes(symbols);
        var result = resp.result;
        var err = resp.err;

        var ks = pickIndex(result, "^KS11");
        var kq = pickIndex(result, "^KQ11");

        updateIndexUI(ks, kospiPrice, kospiChg);
        updateIndexUI(kq, kosdaqPrice, kosdaqChg);

        var now = new Date();
        updatedAt.textContent = "업데이트: " + now.toLocaleString("ko-KR");
        footerTime.textContent = "마지막 업데이트: " + now.toLocaleString("ko-KR");

        var stockOnly = result.filter(function(x){ return x && x.symbol && String(x.symbol).indexOf("^") !== 0; });
        var ranking = buildRankingRows(stockOnly);

        renderTable(volTop10, ranking.byVol);
        renderTable(chgTop10, ranking.byChg);

        if(err && err.length){
          setStatus(false, "일부 오류 (" + err.length + "건)");
          console.log("quote errors:", err);
        }else{
          setStatus(true, "정상");
        }

        try{
          (adsbygoogle = window.adsbygoogle || []).push({});
        }catch(e){}
      }catch(e){
        setStatus(false, "오류");
        console.error(e);
      }
    }

    el("addBtn").addEventListener("click", function(){
      var v = String(symbolInput.value || "").trim().toUpperCase();
      if(!v) return;

      var m = v.match(/^(\d{4,6})\.(KS|KQ)$/);
      if(!m){
        alert("형식이 올바르지 않아.\n예: 005930.KS / 247540.KQ");
        return;
      }

      var sym = v;

      var exists = mergeList().some(function(x){ return x[1] === sym; });
      if(exists){
        symbolInput.value = "";
        refreshAll();
        return;
      }

      var customs = loadCustom();
      customs.push([m[1], sym]);
      saveCustom(customs);

      symbolInput.value = "";
      refreshAll();
    });

    el("refreshBtn").addEventListener("click", refreshAll);
    el("naverBtn").addEventListener("click", function(){
      window.open("https://finance.naver.com/", "_blank");
    });

    symbolInput.addEventListener("keydown", function(e){
      if(e.key === "Enter") el("addBtn").click();
    });

    refreshAll();
  </script>
</body>
</html>
